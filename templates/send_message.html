<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Message - Messaging System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📧 CIMS</h2>
                <p>Welcome, {{ session.full_name }}</p>
                <span class="role-badge role-{{ session.role.lower() }}">{{ session.role }}</span>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('dashboard') }}">📊 Dashboard</a></li>
                <li><a href="{{ url_for('inbox') }}">📥 Inbox</a></li>
                <li><a href="{{ url_for('send_message') }}" class="active">✉️ Send Message</a></li>
                {% if session.role == 'ADMIN' %}
                <li><a href="{{ url_for('reports') }}">📈 Reports</a></li>
                {% endif %}
                <li><a href="{{ url_for('logout') }}">🚪 Logout</a></li>
            </ul>
        </nav>
        
        <main class="dashboard-main">
            <header class="dashboard-header">
                <h1>Send New Message</h1>
            </header>
            
            <div class="dashboard-content">
                {% if error %}
                <div class="error-message">
                    {{ error }}
                </div>
                {% endif %}
                
                <form method="POST" action="{{ url_for('send_message') }}" class="message-form">
                    <div class="form-group">
                        <label for="receiver_id">To:</label>
                        <select id="receiver_id" name="receiver_id" required>
                            <option value="">Select recipient...</option>
                            {% for receiver in receivers %}
                            <option value="{{ receiver[0] }}">
                                {{ receiver[1] }} ({{ receiver[2] }}) - {{ receiver[3] }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="priority">Priority:</label>
                        <select id="priority" name="priority">
                            <option value="low">Low</option>
                            <option value="normal" selected>Normal</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject" required 
                               maxlength="200" placeholder="Enter message subject">
                    </div>
                    
                    <div class="form-group">
                        <label for="message_body">Message:</label>
                        <textarea id="message_body" name="message_body" rows="10" required 
                                  placeholder="Type your message here..."></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Send Message</button>
                        <button type="reset" class="btn btn-secondary">Clear</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
